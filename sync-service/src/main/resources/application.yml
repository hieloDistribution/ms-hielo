server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: sync-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sync_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none                   # Flyway owns the schema; other pre-existing @Entity classes (e.g. ProcessedRequest) will be migrated under a separate change. Revert to 'validate' once the legacy schema is fully under Flyway control.
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 900s
  refresh-token-ttl: 604800s
  issuer: hielo-sync
  audience: hielo-order

security:
  bcrypt-cost: ${BCRYPT_COST:12}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
