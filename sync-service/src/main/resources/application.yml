server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: sync-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sync_db}?prepareThreshold=0
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none                   # Flyway owns the schema; other pre-existing @Entity classes (e.g. ProcessedRequest) will be migrated under a separate change. Revert to 'validate' once the legacy schema is fully under Flyway control.
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
    show-sql: true                     # dev logging; set false in prod
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 900s
  refresh-token-ttl: 604800s
  issuer: hielo-sync
  audience: hielo-order

# Legacy placeholder read by SyncService.@Value; the typed equivalent is
# OrderInternalProperties.baseUrl (used by the /internal/** RestClient).
# Kept here to avoid touching the legacy sync flow; consolidate in a follow-up.
order:
  service:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}

security:
  bcrypt-cost: ${BCRYPT_COST:12}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# ---- PR-2 cross-DB integrity config: forward (sync validates incoming) + reverse (sync calls order) ----
# The same SYNCHRONOUS shared-secret SYNC_SERVICE_TOKEN signs both directions.
hielo:
  sync:
    auth:
      # Validator for incoming HTTP at sync-service /internal/** (used by the bearer-token filter).
      # No default: a missing SYNC_SERVICE_TOKEN env var makes the app fail fast on startup
      # instead of booting with a publicly-known placeholder.
      internal-service-token: ${SYNC_SERVICE_TOKEN:}
  order:
    internal:
      # Outbound client from sync-service → order-service /internal/vendors/by-user/{userId}.
      base-url: ${ORDER_SERVICE_URL:http://localhost:8082}            # order-service actual port (props override yml → 8082)
      connect-timeout: 1s                                            # D-14
      read-timeout: 2s                                               # D-14
      service-token: ${SYNC_SERVICE_TOKEN:}                          # R-3 same shared secret; no default (see comment above)

auth:
  cleanup:
    cron: "0 0 3 * * *"
