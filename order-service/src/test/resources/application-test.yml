spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${TEST_DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # The pre-existing Order/Product/OrderItem entities do not have a Flyway
      # migration yet; this slice bootstraps the schema with JPA. Switch to
      # `validate` once the legacy entities are brought under Flyway control.
      ddl-auto: create-drop
  flyway:
    enabled: false                       # No migrations for order-service in this slice

jwt:
  secret: test-secret-test-secret-test-secret-32+bytes    # 41 bytes, ≥32
  access-token-ttl: 900s
  refresh-token-ttl: 604800s
  issuer: hielo-sync
  audience: hielo-order
