server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none                  # Same workaround as sync-service: the legacy Order/Product/OrderItem entities are not yet under Flyway control.
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 900s                # for symmetry; not used in this slice
  refresh-token-ttl: 604800s
  issuer: hielo-sync                     # MUST match sync-service signer
  audience: hielo-order                  # MUST match the aud expected here

management:
  endpoints:
    web:
      exposure:
        include: health
