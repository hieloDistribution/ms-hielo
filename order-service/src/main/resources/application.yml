server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      # PR-1 deviation from design D-07: keep `none` (not `validate`) because
      # the legacy Order/Product/OrderItem entities are NOT yet under Flyway
      # control; `validate` would fail at boot on unmatched mappings. Switch
      # to `validate` in `order-fk-migration` when the legacy schema is also
      # brought under Flyway. The V1 migration creates only the new tables.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 900s                # for symmetry; not used in this slice
  refresh-token-ttl: 604800s
  issuer: hielo-sync                     # MUST match sync-service signer
  audience: hielo-order                  # MUST match the aud expected here

management:
  endpoints:
    web:
      exposure:
        include: health

# ---- PR-2 forward-direction cross-DB integrity client ----
hielo:
  sync:
    auth:
      base-url: ${SYNC_SERVICE_URL:http://localhost:8081}          # sync-service (props override yml → 8081)
      connect-timeout: 1s                                          # D-14
      read-timeout: 2s                                             # D-14 — combined budget 3s
      service-token: ${SYNC_SERVICE_TOKEN:dev-shared-secret-change-me}  # R-3
      enabled: true                                                # set false + stub in tests if needed
